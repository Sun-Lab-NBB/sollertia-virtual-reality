# Project: StateSpaceOdyssey
# Purpose: Interleaves ABC and ABDC trials. Depending on the chosen base trial, this constitutes either shortcut
#          (one less cue) or extension (one more cue) modification relative to the base trial.
# Layout:  Segment ABC with the rewarding stimulus (water) trigger zone in cue C.
#          Segment ABDC with the rewarding stimulus (water) trigger zone in cue C.
# Related: SSO_Shared_Base (ABC base training), SSO_Shortcut_Base (ABDC base training)

cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
    texture: "Gray Cue 2x1.png"
  - name: "A"
    code: 1
    length_cm: 40.0
    texture: "Cue 016 - 4x1.png"
  - name: "B"
    code: 2
    length_cm: 40.0
    texture: "Cue 001 - 4x1.png"
  - name: "C"
    code: 3
    length_cm: 40.0
    texture: "Cue 008 - 2x1 repeat.png"
  - name: "D"
    code: 4
    length_cm: 40.0
    texture: "Cue 002 - 4x1.png"

segments:
  - name: "abc"
    cue_sequence: ["A", "Gray", "B", "Gray", "C", "Gray"]
    transition_probabilities: [0.5, 0.5]

  - name: "abdc"
    cue_sequence: ["A", "Gray", "B", "Gray", "D", "Gray", "C", "Gray"]
    transition_probabilities: [0.5, 0.5]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  ABC:
    segment_name: "abc"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"

  ABDC:
    segment_name: "abdc"
    stimulus_trigger_zone_start_cm: 248.0
    stimulus_trigger_zone_end_cm: 272.0
    stimulus_location_cm: 268.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"
