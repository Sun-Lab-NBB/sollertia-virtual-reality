# Project: StateSpaceOdyssey
# Purpose: Teaches the AGFE segment structure before merging trials.
# Layout:  Segment AGFE with the rewarding stimulus (water) trigger zone in cue E.
# Related: SSO_Shared_Base (ABC base training), SSO_Merging (combined ABC/AGFE trials)

cue_offset_cm: 10.0

cues:
  - name: "Gray"
    code: 0
    length_cm: 40.0
    texture: "Gray Cue 2x1.png"
  - name: "A"
    code: 1
    length_cm: 40.0
    texture: "Cue 016 - 4x1.png"
  - name: "B"
    code: 2
    length_cm: 40.0
    texture: "Cue 001 - 4x1.png"
  - name: "C"
    code: 3
    length_cm: 40.0
    texture: "Cue 008 - 2x1 repeat.png"
  - name: "D"
    code: 4
    length_cm: 40.0
    texture: "Cue 002 - 4x1.png"
  - name: "E"
    code: 5
    length_cm: 40.0
    texture: "Cue 034 - 2x1 repeat.png"
  - name: "F"
    code: 6
    length_cm: 40.0
    texture: "Cue 035 - 2x1 repeat.png"
  - name: "G"
    code: 7
    length_cm: 40.0
    texture: "Cue 014 - 4x1.png"

segments:
  - name: "Segment_agfe_g_320cm"
    cue_sequence: ["A", "Gray", "G", "Gray", "F", "Gray", "E", "Gray"]

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0

trial_structures:
  AGFE:
    segment_name: "Segment_agfe_g_320cm"
    stimulus_trigger_zone_start_cm: 168.0
    stimulus_trigger_zone_end_cm: 192.0
    stimulus_location_cm: 188.0
    show_stimulus_collision_boundary: false
    trigger_type: "lick"
