# Project: MaalstroomicFlow
# Purpose: Defines a cyclic 8-cue corridor with a rewarding stimulus trigger zone at the end of the corridor.
# Layout:  Segment ABCDEFGH with the rewarding stimulus (water) trigger zone in cue H.
# Related: MF_Aversion_Reward (extends the task to allow studying both reward and aversion coding).

cues:
  - name: "Gray" # This is a placeholder, the task does not use Gray cues.
    code: 0
    length_cm: 1.0
    texture: "Gray Cue 2x1.png"
  - name: "A"
    code: 1
    length_cm: 50.0
    texture: "Cue 016 - 4x1.png"
  - name: "B"
    code: 2
    length_cm: 50.0
    texture: "Cue 001 - 4x1.png"
  - name: "C"
    code: 3
    length_cm: 50.0
    texture: "Cue 008 - 4x1.png"
  - name: "D"
    code: 4
    length_cm: 50.0
    texture: "Cue 002 - 4x1.png"
  - name: "E"
    code: 5
    length_cm: 50.0
    texture: "Cue 034 - 2x1 repeat.png"
  - name: "F"
    code: 6
    length_cm: 50.0
    texture: "Cue 035 - 2x1 repeat.png"
  - name: "G"
    code: 7
    length_cm: 50.0
    texture: "Cue 014 - 4x1.png"
  - name: "H"
    code: 8
    length_cm: 50.0
    texture: "Cue 005 - 2x1 repeat.png"

vr_environment:
  corridor_spacing_cm: 20.0
  segments_per_corridor: 3
  padding_prefab_name: "Padding"
  cm_per_unity_unit: 10.0
  cue_offset_cm: 10.0

trial_structures:
  cyclic_8_cue:
    cue_sequence: ["A", "B", "C", "D", "E", "F", "G", "H"]
    stimulus_trigger_zone_start_cm: 357.5
    stimulus_trigger_zone_end_cm: 392.5
    stimulus_location_cm: 388.5
    show_stimulus_collision_boundary: false
    trigger_type: "interaction"
